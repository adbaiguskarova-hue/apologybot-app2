<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApologyBot — Генератор писем-извинений</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #0088cc;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 5px;
            display: none;
        }
    </style>
    <!-- Подключаем Telegram WebApp SDK — это даёт доступ к функциям Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>📝 ApologyBot</h1>
    <p>Заполните форму, чтобы получить письмо-извинение на русском и английском</p>

    <form id="apologyForm">
        <div class="form-group">
            <label>1. Обращение к адресату</label>
            <input type="text" id="address" placeholder="Уважаемая Полина Викторовна!" required>
        </div>

        <div class="form-group">
            <label>2. Представьтесь</label>
            <input type="text" id="sender" placeholder="Это отдел поддержки клиентов компании...">
        </div>

        <div class="form-group">
            <label>3. Стиль извинения</label>
            <select id="style">
                <option>Просим принять наши извинения за...</option>
                <option>Приносим Вам свои извинения за...</option>
                <option>Хотим выразить свои искренние извинения за...</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. Опишите проблему</label>
            <textarea id="problem" rows="2" placeholder="поставку бракованного товара №45 от 13.04.2026"></textarea>
        </div>

        <div class="form-group">
            <label>5. Признание вины</label>
            <textarea id="guilt" rows="2" placeholder="Ситуация произошла по нашей вине, о чем мы искренне сожалеем."></textarea>
        </div>

        <div class="form-group">
            <label>6. Причина</label>
            <textarea id="reason" rows="2" placeholder="В связи с низким контролем качества на завод попала партия низкосортного материала."></textarea>
        </div>

        <div class="form-group">
            <label>7. Принятые меры</label>
            <textarea id="actions" rows="2" placeholder="Поставщика материалов уже сменили, ожидается скорое продолжение производства."></textarea>
        </div>

        <div class="form-group">
            <label>8. Подпись</label>
            <input type="text" id="signature" placeholder="С уважением, отдел поддержки клиентов">
        </div>

        <button type="button" onclick="generateLetter()">Сгенерировать письмо</button>
    </form>

    <div id="result" class="result"></div>

    <script>
        // Инициализируем Telegram WebApp
        const webApp = window.Telegram.WebApp;
        webApp.ready();
        
        // Здесь будет функция отправки данных на ваш сервер
        async function generateLetter() {
            const data = {
                address: document.getElementById('address').value,
                sender: document.getElementById('sender').value,
                style: document.getElementById('style').value,
                problem: document.getElementById('problem').value,
                guilt: document.getElementById('guilt').value,
                reason: document.getElementById('reason').value,
                actions: document.getElementById('actions').value,
                signature: document.getElementById('signature').value
            };
            
            // Отправляем данные на ваш Python-сервер
            const response = await fetch('https://ваш-сервер.com/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            document.getElementById('result').innerHTML = `
                <h3>Русское письмо:</h3>
                <pre>${result.russian}</pre>
                <h3>English letter:</h3>
                <pre>${result.english}</pre>
            `;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
